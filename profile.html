  <!-- ========== MAIN CONTENT ========== -->
  <main class="up-main">

    <nav class="breadcrumb-bar" aria-label="ניווט מיקום">
      <div class="breadcrumb-inner">
        <a href="index.html" class="breadcrumb-link">עמוד הבית</a>
        <span class="breadcrumb-sep" aria-hidden="true">›</span>
        <span class="breadcrumb-current" aria-current="page">פרטים אישיים</span>
      </div>
    </nav>

    <section class="up-section" aria-labelledby="up-heading">
      <div class="up-inner">

        <div class="up-card">

          <!-- Avatar + name header -->
          <div class="up-card-header">
            <div class="up-avatar" aria-hidden="true">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </div>
            <div class="up-card-header-text">
              <h1 class="up-card-name" id="up-heading">ישראל ישראלי</h1>
              <p class="up-card-email">israel@example.com</p>
            </div>
          </div>

          <form class="up-form" novalidate>

            <!-- ── Personal details ── -->
            <h2 class="up-form-section-title">פרטים אישיים</h2>

            <div class="cp-row">
              <div class="cp-field">
                <input class="cp-input" id="up-first-name" type="text" placeholder=" " value="ישראל" autocomplete="given-name">
                <label class="cp-floating-label" for="up-first-name">שם פרטי</label>
              </div>
              <div class="cp-field">
                <input class="cp-input" id="up-last-name" type="text" placeholder=" " value="ישראלי" autocomplete="family-name">
                <label class="cp-floating-label" for="up-last-name">שם משפחה</label>
              </div>
            </div>

            <div class="cp-row">
              <div class="cp-field">
                <input class="cp-input" id="up-phone" type="tel" placeholder=" " value="054-000-0000" autocomplete="tel">
                <label class="cp-floating-label" for="up-phone">טלפון</label>
              </div>
              <div class="cp-field">
                <input class="cp-input" id="up-email" type="email" placeholder=" " value="israel@example.com" autocomplete="email">
                <label class="cp-floating-label" for="up-email">מייל</label>
              </div>
            </div>

            <div class="up-divider"></div>

            <!-- ── Password change ── -->
            <h2 class="up-form-section-title">שינוי סיסמה</h2>

            <div class="cp-field">
              <input class="cp-input" id="up-current-pass" type="password" placeholder=" " autocomplete="current-password">
              <label class="cp-floating-label" for="up-current-pass">סיסמה נוכחית</label>
            </div>

            <div class="cp-row">
              <div class="cp-field">
                <input class="cp-input" id="up-new-pass" type="password" placeholder=" " autocomplete="new-password">
                <label class="cp-floating-label" for="up-new-pass">סיסמה חדשה</label>
              </div>
              <div class="cp-field">
                <input class="cp-input" id="up-confirm-pass" type="password" placeholder=" " autocomplete="new-password">
                <label class="cp-floating-label" for="up-confirm-pass">אימות סיסמה</label>
              </div>
            </div>

            <div class="up-form-footer">
              <button type="submit" class="up-submit">שמירת שינויים</button>
            </div>

          </form>
        </div>

      </div>
    </section>
  </main>

  <script src="footer.js"></script>

  <script>
    // Mobile menu toggle
    (function () {
      var hamburger  = document.querySelector('.hamburger');
      var mobileMenu = document.getElementById('mobile-menu-profile');
      if (!hamburger || !mobileMenu) return;
      hamburger.addEventListener('click', function () {
        var isOpen = mobileMenu.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        hamburger.setAttribute('aria-expanded', isOpen);
        mobileMenu.setAttribute('aria-hidden', !isOpen);
      });
      mobileMenu.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () {
          mobileMenu.classList.remove('open');
          hamburger.classList.remove('open');
          hamburger.setAttribute('aria-expanded', false);
          mobileMenu.setAttribute('aria-hidden', true);
        });
      });
    }());

    // Nav user dropdown toggle
    (function () {
      var btn      = document.getElementById('navUserBtn');
      var dropdown = document.getElementById('navUserDropdown');
      var wrapper  = document.getElementById('navUser');
      if (!btn || !dropdown) return;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = wrapper.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen);
      });
      document.addEventListener('click', function () {
        wrapper.classList.remove('open');
        btn.setAttribute('aria-expanded', false);
      });
    }());
  </script>

</body>
</html>
